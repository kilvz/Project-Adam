# Project Adam configuration
# See docs/setup.md for a full reference.

device: cuda
base_model: Qwen/Qwen2.5-1.5B-Instruct
model_chain:
  - Qwen/Qwen2.5-1.5B-Instruct
memory_dir: agent_memory
persona_path: personas/adam.md

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: torch.float16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: false

generation:
  max_new_tokens: 128
  temperature: 0.7
  top_p: 0.9
  # top_k: 40  # uncomment to enable top-k sampling

backend:
  mode: "auto"                        # "auto", "local", or "api"
  api:
    endpoint: "https://<remoteapibackend>/v1/chat/completions"
    key: ""
    model: "ai-model"
    timeout: 30

self_play:
  enabled: true                    # auto-start on agent init
  interval_seconds: 120            # seconds between query batches
  batch_size: 8                    # queries per batch
  strategies:
    - schema
    - world_model
    - procedural
    - creative
  reward: 0.85                     # default reward for teacher pairs
