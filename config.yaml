# Project Adam configuration
# See docs/setup.md for a full reference.

device: cuda                       # "cuda" or "cpu"
base_model: Qwen/Qwen2.5-3B-Instruct
model_chain:
  - Qwen/Qwen2.5-3B-Instruct
  - Qwen/Qwen2.5-1.5B-Instruct
  - Qwen/Qwen2.5-0.5B-Instruct
memory_dir: agent_memory
persona_path: persona-studio/personas/adam.md

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: torch.float16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: false

generation:
  max_new_tokens: 128
  temperature: 0.7
  top_p: 0.9

backend:
  mode: "api"                         # "local" or "api"
  api:
    endpoint: "https://external.ai/zen/v1/chat/completions"
    key: ""                           # external public endpoint, no key needed
    model: "External"
    timeout: 60
